name: Deploy Initial Claims Dashboard

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'data_pipeline/initial_jobless_claims/dashboard/**'
      - 'data_pipeline/initial_jobless_claims/data/raw/macromicro/chart19_all_series_latest.csv'
      - 'data_pipeline/initial_jobless_claims/scripts/prepare_public_site.py'
      - '.github/workflows/initial-jobless-dashboard-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages-initial-claims'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build public site bundle
        run: python3 data_pipeline/initial_jobless_claims/scripts/prepare_public_site.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: data_pipeline/initial_jobless_claims/public_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
